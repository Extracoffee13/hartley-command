<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hartley Capital — Build What Lasts</title>

  <!-- Open Graph / Social -->
  <meta property="og:type"        content="website">
  <meta property="og:url"         content="https://hartleyequity.com">
  <meta property="og:title"       content="Hartley Capital — Build What Lasts">
  <meta property="og:description" content="Private Capital · Strategic Growth · Generational Legacy. Launching Q2 2026.">
  <meta property="og:image"       content="https://hartleyequity.com/og-preview.jpg">
  <meta name="twitter:card"       content="summary_large_image">
  <meta name="twitter:title"      content="Hartley Capital — Build What Lasts">
  <meta name="twitter:description" content="Private Capital · Strategic Growth · Generational Legacy. Launching Q2 2026.">
  <meta name="description"        content="Hartley Capital — Private Capital · Strategic Growth · Generational Legacy. Launching Q2 2026.">

  <!-- Favicon: HC monogram -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' fill='%230d1117'/><text x='50%25' y='56%25' dominant-baseline='middle' text-anchor='middle' font-family='serif' font-size='18' font-weight='600' fill='%23c9a96e'>HC</text></svg>">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    /* ─── Reset & Base ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:       #0d1117;
      --navy-deep:  #070a0f;
      --gold:       #c9a96e;
      --gold-dim:   rgba(201,169,110,0.55);
      --gold-faint: rgba(201,169,110,0.12);
      --gold-glow:  rgba(201,169,110,0.25);
      --white:      #f5f5f0;
      --white-dim:  rgba(245,245,240,0.58);
      --white-faint:rgba(245,245,240,0.18);

      /* Golden ratio spacing */
      --phi: 1.618;
      --sp-xs: 8px;
      --sp-sm: 13px;
      --sp-md: 21px;
      --sp-lg: 34px;
      --sp-xl: 55px;
      --sp-2xl:89px;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--navy-deep);
      color: var(--white);
      font-family: "Inter", -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Prevent overflow on mobile if content is taller */
    @media (max-height: 680px) {
      html, body { overflow-y: auto; }
    }

    /* ─── Star Field Canvas ─────────────────────────────────────── */
    #stars {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    /* ─── Gradient Overlays ─────────────────────────────────────── */
    .vignette {
      position: fixed;
      inset: 0;
      z-index: 1;
      background:
        radial-gradient(ellipse 80% 60% at 50% 50%, transparent 40%, rgba(7,10,15,0.85) 100%),
        linear-gradient(180deg, rgba(7,10,15,0.5) 0%, transparent 20%, transparent 75%, rgba(7,10,15,0.7) 100%);
      pointer-events: none;
    }

    /* Subtle gold nebula bloom behind logo */
    .nebula {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: min(700px, 100vw);
      height: min(700px, 100vw);
      border-radius: 50%;
      background: radial-gradient(circle, rgba(201,169,110,0.035) 0%, transparent 70%);
      z-index: 1;
      pointer-events: none;
      animation: nebulaPulse 8s ease-in-out infinite;
    }
    @keyframes nebulaPulse {
      0%, 100% { opacity: 0.7; transform: translate(-50%,-50%) scale(1); }
      50%       { opacity: 1;   transform: translate(-50%,-50%) scale(1.12); }
    }

    /* ─── Layout Shell ──────────────────────────────────────────── */
    .page {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      min-height: 100dvh;
      padding: var(--sp-lg) var(--sp-md);
    }

    /* ─── Top Wordmark ──────────────────────────────────────────── */
    .wordmark {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      text-align: center;
    }
    .wordmark-text {
      font-family: "Inter", sans-serif;
      font-weight: 500;
      font-size: clamp(9px, 1.8vw, 11px);
      letter-spacing: 0.38em;
      text-transform: uppercase;
      color: var(--gold);
      opacity: 0.9;
    }
    .wordmark-rule {
      width: 34px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
    }

    /* ─── Hero Center ───────────────────────────────────────────── */
    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--sp-lg);
      text-align: center;
      width: 100%;
      max-width: 760px;
    }

    /* ─── Logo ──────────────────────────────────────────────────── */
    .logo-wrap {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    /* Outer glow ring */
    .logo-wrap::before {
      content: '';
      position: absolute;
      inset: -20px;
      border-radius: 50%;
      background: radial-gradient(circle, var(--gold-glow) 0%, transparent 70%);
      animation: logoGlow 4s ease-in-out infinite;
      pointer-events: none;
    }
    @keyframes logoGlow {
      0%, 100% { opacity: 0.5; transform: scale(0.95); }
      50%       { opacity: 1;   transform: scale(1.05); }
    }

    .logo-svg {
      width: clamp(110px, 20vw, 160px);
      filter: drop-shadow(0 0 18px rgba(201,169,110,0.3));
      animation: logoShimmer 6s ease-in-out infinite;
    }
    @keyframes logoShimmer {
      0%, 100% { filter: drop-shadow(0 0 18px rgba(201,169,110,0.3)); }
      50%       { filter: drop-shadow(0 0 32px rgba(201,169,110,0.55)); }
    }

    /* Puzzle piece fill animation */
    .puzzle-piece {
      fill: var(--gold-faint);
      stroke: var(--gold);
      stroke-width: 1.5;
      transition: fill 0.3s;
    }
    .logo-wrap:hover .puzzle-piece {
      fill: rgba(201,169,110,0.18);
    }
    .logo-letter {
      fill: var(--gold);
      font-family: "Playfair Display", serif;
      font-size: 22px;
      font-weight: 500;
    }

    /* ─── Tagline Block ─────────────────────────────────────────── */
    .tagline-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--sp-sm);
    }

    .tagline {
      font-family: "Playfair Display", Georgia, serif;
      font-weight: 500;
      font-size: clamp(36px, 7vw, 68px);
      letter-spacing: -0.01em;
      line-height: 1.1;
      color: var(--white);
      /* Subtle gold shimmer sweep */
      background: linear-gradient(
        135deg,
        var(--white) 0%,
        var(--white) 40%,
        var(--gold) 55%,
        var(--white) 70%,
        var(--white) 100%
      );
      background-size: 300% 100%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: taglineSweep 8s ease-in-out infinite;
    }
    @keyframes taglineSweep {
      0%   { background-position: 200% center; }
      40%  { background-position: 200% center; }
      60%  { background-position:   0% center; }
      100% { background-position:   0% center; }
    }

    .sub-tagline {
      font-family: "Inter", sans-serif;
      font-weight: 300;
      font-size: clamp(12px, 2.2vw, 14px);
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--white-dim);
    }
    .sub-dot {
      color: var(--gold-dim);
      margin: 0 0.5em;
    }

    /* ─── Divider ───────────────────────────────────────────────── */
    .divider {
      width: 89px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
    }

    /* ─── Launch Line ───────────────────────────────────────────── */
    .launch-line {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .launch-text {
      font-family: "Cormorant Garamond", Georgia, serif;
      font-style: italic;
      font-weight: 300;
      font-size: clamp(13px, 2.2vw, 15px);
      letter-spacing: 0.12em;
      color: var(--gold);
      opacity: 0.85;
    }

    /* ─── Email Form ────────────────────────────────────────────── */
    .notify-wrap {
      width: 100%;
      max-width: 420px;
    }
    .notify-label {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--white-dim);
      text-align: center;
      margin-bottom: 12px;
    }

    .notify-form {
      display: flex;
      gap: 0;
      width: 100%;
      border: 1px solid rgba(201,169,110,0.35);
      border-radius: 3px;
      overflow: hidden;
      background: rgba(201,169,110,0.04);
      backdrop-filter: blur(8px);
      transition: border-color 0.3s;
    }
    .notify-form:focus-within {
      border-color: rgba(201,169,110,0.7);
      box-shadow: 0 0 0 3px rgba(201,169,110,0.1);
    }

    .notify-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      padding: 14px 18px;
      font-family: "Inter", sans-serif;
      font-size: 13px;
      font-weight: 400;
      color: var(--white);
      letter-spacing: 0.02em;
    }
    .notify-input::placeholder {
      color: var(--white-faint);
      letter-spacing: 0.04em;
    }

    .notify-btn {
      background: var(--gold);
      border: none;
      padding: 14px 22px;
      font-family: "Inter", sans-serif;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--navy-deep);
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.25s, transform 0.15s;
    }
    .notify-btn:hover  { background: #d9b97e; }
    .notify-btn:active { transform: scale(0.97); }

    /* Success state */
    .notify-success {
      display: none;
      text-align: center;
      padding: 14px;
      font-family: "Cormorant Garamond", serif;
      font-style: italic;
      font-size: 15px;
      color: var(--gold);
      letter-spacing: 0.05em;
      border: 1px solid rgba(201,169,110,0.3);
      border-radius: 3px;
      background: rgba(201,169,110,0.06);
    }

    /* ─── Footer Credentials ────────────────────────────────────── */
    .credentials {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      text-align: center;
    }
    .cred-line {
      font-family: "Inter", sans-serif;
      font-size: clamp(9px, 1.6vw, 10px);
      font-weight: 400;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(245,245,240,0.22);
    }
    .cred-dot { margin: 0 0.6em; opacity: 0.5; }

    /* ─── Constellation SVG (background decoration) ──────────────── */
    .constellation {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      opacity: 0.07;
    }

    /* ─── Mobile Breakpoints ────────────────────────────────────── */
    @media (max-width: 480px) {
      .page { padding: var(--sp-md) var(--sp-sm); gap: var(--sp-md); }
      .notify-form { flex-direction: column; }
      .notify-input { border-bottom: 1px solid rgba(201,169,110,0.2); text-align: center; }
      .notify-btn { width: 100%; padding: 13px; }
      .sub-tagline { font-size: 10px; letter-spacing: 0.15em; }
    }
    @media (max-width: 360px) {
      .tagline { font-size: 30px; }
    }

    /* ─── Scroll (when viewport is too short) ───────────────────── */
    @media (max-height: 680px) {
      .page { min-height: unset; padding: var(--sp-md) var(--sp-md) var(--sp-xl); gap: var(--sp-md); }
    }

    /* ─── Fade-in on load ───────────────────────────────────────── */
    .fade-in {
      opacity: 0;
      transform: translateY(12px);
      animation: fadeUp 1s ease forwards;
    }
    .fade-in:nth-child(1) { animation-delay: 0.1s; }
    .fade-in:nth-child(2) { animation-delay: 0.35s; }
    .fade-in:nth-child(3) { animation-delay: 0.6s; }
    .fade-in:nth-child(4) { animation-delay: 0.85s; }
    .fade-in:nth-child(5) { animation-delay: 1.0s; }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<!-- Star field -->
<canvas id="stars"></canvas>

<!-- Background gold nebula -->
<div class="nebula"></div>

<!-- Subtle vignette -->
<div class="vignette"></div>

<!-- Constellation decoration -->
<svg class="constellation" viewBox="0 0 1440 900" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <!-- Orion-inspired pattern, very faint -->
  <circle cx="320"  cy="180" r="2.5" fill="#c9a96e"/>
  <circle cx="440"  cy="140" r="1.5" fill="#c9a96e"/>
  <circle cx="560"  cy="200" r="3"   fill="#c9a96e"/>
  <circle cx="680"  cy="120" r="2"   fill="#c9a96e"/>
  <circle cx="820"  cy="160" r="1.8" fill="#c9a96e"/>
  <circle cx="960"  cy="210" r="2.2" fill="#c9a96e"/>
  <circle cx="1100" cy="130" r="1.5" fill="#c9a96e"/>
  <circle cx="1220" cy="190" r="2.8" fill="#c9a96e"/>
  <circle cx="280"  cy="720" r="1.8" fill="#c9a96e"/>
  <circle cx="400"  cy="760" r="2.5" fill="#c9a96e"/>
  <circle cx="540"  cy="700" r="1.5" fill="#c9a96e"/>
  <circle cx="1080" cy="740" r="2"   fill="#c9a96e"/>
  <circle cx="1200" cy="700" r="2.5" fill="#c9a96e"/>
  <circle cx="1320" cy="760" r="1.8" fill="#c9a96e"/>
  <!-- Constellation lines -->
  <line x1="320" y1="180" x2="440" y2="140" stroke="#c9a96e" stroke-width="0.8" opacity="0.5"/>
  <line x1="440" y1="140" x2="560" y2="200" stroke="#c9a96e" stroke-width="0.8" opacity="0.5"/>
  <line x1="560" y1="200" x2="680" y2="120" stroke="#c9a96e" stroke-width="0.8" opacity="0.5"/>
  <line x1="680" y1="120" x2="820" y2="160" stroke="#c9a96e" stroke-width="0.8" opacity="0.5"/>
  <line x1="820" y1="160" x2="960" y2="210" stroke="#c9a96e" stroke-width="0.8" opacity="0.5"/>
  <line x1="960" y1="210" x2="1100" y2="130" stroke="#c9a96e" stroke-width="0.8" opacity="0.5"/>
  <line x1="1100" y1="130" x2="1220" y2="190" stroke="#c9a96e" stroke-width="0.8" opacity="0.5"/>
  <line x1="280" y1="720" x2="400" y2="760" stroke="#c9a96e" stroke-width="0.8" opacity="0.5"/>
  <line x1="400" y1="760" x2="540" y2="700" stroke="#c9a96e" stroke-width="0.8" opacity="0.5"/>
  <line x1="1080" y1="740" x2="1200" y2="700" stroke="#c9a96e" stroke-width="0.8" opacity="0.5"/>
  <line x1="1200" y1="700" x2="1320" y2="760" stroke="#c9a96e" stroke-width="0.8" opacity="0.5"/>
</svg>

<!-- ─────────────────────────────────────────────────────────── -->
<main class="page" role="main">

  <!-- Top wordmark -->
  <header class="wordmark fade-in">
    <div class="wordmark-text">Hartley Capital</div>
    <div class="wordmark-rule"></div>
  </header>

  <!-- Hero center -->
  <section class="hero" aria-label="Coming soon announcement">

    <!-- HC Puzzle Piece Logo -->
    <div class="logo-wrap fade-in" aria-label="Hartley Capital logo">
      <svg class="logo-svg" viewBox="0 0 156 80" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-hidden="true">
        <!--
          Two interlocking puzzle pieces.
          Left piece: rectangle 8,6 → 76,74 with circular tab protruding right at midpoint.
          Right piece: rectangle 80,6 → 148,74 with matching circular notch on left.
          Tab radius = 14px, midpoint Y = 40 ± 14
        -->
        <!-- Left piece -->
        <path class="puzzle-piece"
          d="M8,6
             H76
             V26
             a14,14 0 0,1 0,28
             V74
             H8
             Z"
        />
        <!-- Right piece -->
        <path class="puzzle-piece"
          d="M148,6
             H80
             V26
             a14,14 0 0,0 0,28
             V74
             H148
             Z"
        />
        <!-- H letter (centered in left piece, ~x=42, avoiding tab zone) -->
        <text class="logo-letter" x="36" y="48" text-anchor="middle">H</text>
        <!-- C letter (centered in right piece, ~x=114, avoiding notch zone) -->
        <text class="logo-letter" x="120" y="48" text-anchor="middle">C</text>
      </svg>
    </div>

    <!-- Tagline block -->
    <div class="tagline-block fade-in">
      <h1 class="tagline">Build What Lasts.</h1>
      <p class="sub-tagline">
        Private Capital
        <span class="sub-dot">·</span>
        Strategic Growth
        <span class="sub-dot">·</span>
        Generational Legacy
      </p>
    </div>

    <!-- Divider -->
    <div class="divider fade-in" aria-hidden="true"></div>

    <!-- Launch timing -->
    <div class="launch-line fade-in">
      <span class="launch-text">Launching Q2 2026</span>
    </div>

    <!-- Email capture -->
    <div class="notify-wrap fade-in">
      <p class="notify-label">Be the first to know</p>

      <!--
        FORMSPREE SETUP:
        1. Go to formspree.io and create a free account
        2. Create a new form → copy your Form ID
        3. Replace "YOUR_FORM_ID" below with your actual ID
           e.g. action="https://formspree.io/f/xabc1234"
        4. Alternatively, use the mailto fallback — it will open the user's email app
      -->
      <form
        class="notify-form"
        id="notifyForm"
        action="https://formspree.io/f/YOUR_FORM_ID"
        method="POST"
        novalidate
      >
        <input
          class="notify-input"
          type="email"
          name="email"
          placeholder="your@email.com"
          required
          autocomplete="email"
          aria-label="Email address"
        >
        <button class="notify-btn" type="submit" aria-label="Subscribe for updates">
          Notify&nbsp;Me
        </button>
      </form>

      <div class="notify-success" id="notifySuccess" role="status">
        You're on the list. We'll be in touch.
      </div>
    </div>

  </section>

  <!-- Footer credentials -->
  <footer class="credentials fade-in" aria-label="Company details">
    <p class="cred-line">
      Jacksonville, FL
      <span class="cred-dot">·</span>
      HBS Alumni Network
      <span class="cred-dot">·</span>
      40 Years of Building
    </p>
    <p class="cred-line" style="opacity:0.5">
      &copy; 2026 Hartley Capital
      <span class="cred-dot">·</span>
      hartleyequity.com
    </p>
  </footer>

</main>

<script>
  /* ─── Star Field ──────────────────────────────────────────────── */
  (function () {
    var canvas = document.getElementById('stars');
    var ctx    = canvas.getContext('2d');
    var stars  = [];
    var W, H;

    function resize() {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }

    function seed() {
      stars = [];
      var n = Math.min(Math.floor((W * H) / 6000), 280);
      for (var i = 0; i < n; i++) {
        stars.push({
          x:     Math.random() * W,
          y:     Math.random() * H,
          r:     Math.random() * 1.4 + 0.2,
          o:     Math.random() * 0.55 + 0.08,
          speed: Math.random() * 0.08 + 0.01,
          twinklePhase: Math.random() * Math.PI * 2,
          gold: Math.random() < 0.25   // ~25% of stars have gold tint
        });
      }
    }

    var frame = 0;
    function draw() {
      ctx.clearRect(0, 0, W, H);
      frame += 0.012;
      for (var i = 0; i < stars.length; i++) {
        var s = stars[i];
        var twinkle = 0.75 + 0.25 * Math.sin(s.twinklePhase + frame);
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = s.gold
          ? 'rgba(201,169,110,' + (s.o * twinkle) + ')'
          : 'rgba(245,245,240,' + (s.o * twinkle * 0.7) + ')';
        ctx.fill();
        s.y -= s.speed;
        if (s.y + s.r < 0) {
          s.y = H + s.r;
          s.x = Math.random() * W;
        }
      }
      requestAnimationFrame(draw);
    }

    window.addEventListener('resize', function () { resize(); seed(); });
    resize();
    seed();
    draw();
  })();

  /* ─── Form Handling ───────────────────────────────────────────── */
  (function () {
    var form    = document.getElementById('notifyForm');
    var success = document.getElementById('notifySuccess');
    if (!form) return;

    form.addEventListener('submit', function (e) {
      var action = form.getAttribute('action') || '';
      // If Formspree ID hasn't been set, fall back to mailto
      if (action.indexOf('YOUR_FORM_ID') !== -1) {
        e.preventDefault();
        var email = form.querySelector('input[type=email]').value.trim();
        if (!email) return;
        window.location.href = 'mailto:info@hartleyequity.com?subject=Notify%20Me&body=Please%20add%20' + encodeURIComponent(email) + '%20to%20the%20launch%20list.';
        return;
      }
      // Formspree AJAX submission
      e.preventDefault();
      var data = new FormData(form);
      fetch(action, {
        method: 'POST',
        body: data,
        headers: { 'Accept': 'application/json' }
      })
      .then(function (r) {
        if (r.ok) {
          form.style.display = 'none';
          success.style.display = 'block';
          var label = form.previousElementSibling;
          if (label) label.style.display = 'none';
        }
      })
      .catch(function () {
        /* silent fallback — form will attempt natural POST */
        form.submit();
      });
    });
  })();
</script>

</body>
</html>
