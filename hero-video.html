<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Hartley Capital — Hero Video Preview</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #024256; display: flex; flex-direction: column; align-items: center; min-height: 100vh; font-family: 'Helvetica Neue', sans-serif; color: white; padding: 20px 20px 40px; }
  h1 { font-size: 16px; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 24px; opacity: 0.8; padding-top: 20px; }

  .tabs { display: flex; gap: 0; margin-bottom: 20px; border-radius: 6px; overflow: hidden; border: 1px solid rgba(255,255,255,0.2); }
  .tab { padding: 9px 24px; font-size: 13px; letter-spacing: 1.5px; text-transform: uppercase; cursor: pointer; background: transparent; color: rgba(255,255,255,0.6); border: none; transition: all 0.2s; }
  .tab.active { background: rgba(255,255,255,0.12); color: #fff; }
  .tab:hover:not(.active) { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.8); }

  .video-wrap { width: 100%; display: flex; justify-content: center; }
  .panel { display: none; width: 100%; justify-content: center; }
  .panel.active { display: flex; }

  .desktop-video { width: 100%; max-width: 960px; border-radius: 4px; }
  .mobile-video  { width: 100%; max-width: 360px; border-radius: 4px; }

  .meta { margin-top: 14px; font-size: 13px; opacity: 0.5; letter-spacing: 0.5px; }
</style>
</head>
<body>
<h1>Hartley Capital — Hero Video V1</h1>

<div class="tabs">
  <button class="tab active" id="tab-desktop" onclick="show('desktop')">Desktop 16:9</button>
  <button class="tab"        id="tab-mobile"  onclick="show('mobile')">Mobile 9:16</button>
</div>

<div class="video-wrap">
  <div class="panel active" id="panel-desktop">
    <video class="desktop-video" autoplay muted loop playsinline controls>
      <source src="hartley-capital-hero.mp4?v=1775958900" type="video/mp4">
    </video>
  </div>
  <div class="panel" id="panel-mobile">
    <video class="mobile-video" controls playsinline>
      <source src="hartley-capital-hero-mobile.mp4" type="video/mp4">
    </video>
  </div>
</div>

<p class="meta" id="meta-text">90s · 1920×1080</p>

<script>
  const meta = { desktop: '90s · 1920×1080', mobile: '90s · 1080×1920' };
  function show(v) {
    ['desktop','mobile'].forEach(t => {
      document.getElementById('tab-'   + t).classList.toggle('active', t === v);
      document.getElementById('panel-' + t).classList.toggle('active', t === v);
    });
    document.getElementById('meta-text').textContent = meta[v];
    // pause the other video
    const other = v === 'desktop' ? 'mobile' : 'desktop';
    document.querySelector('#panel-' + other + ' video').pause();
  }

  // Auto-select mobile tab if viewport is portrait
  if (window.innerHeight > window.innerWidth) show('mobile');
</script>
</body>
</html>
