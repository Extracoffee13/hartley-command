<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moon — Hartley Capital</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #024256; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="c" width="375" height="812"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 375, H = 812;
let t = 0;

const cx = W / 2;
const cy = H * 0.38;
const moonR = 90;

// Pre-generate craters
const craters = [
  { x: -30, y: -20, r: 18 },
  { x: 25, y: 10, r: 14 },
  { x: -10, y: 35, r: 11 },
  { x: 40, y: -30, r: 9 },
  { x: -45, y: 15, r: 8 },
  { x: 15, y: -50, r: 12 },
  { x: -20, y: 55, r: 7 },
  { x: 50, y: 30, r: 6 },
  { x: -55, y: -40, r: 7 },
  { x: 5, y: -10, r: 22 },
  { x: 35, y: 50, r: 10 },
  { x: -35, y: -55, r: 6 },
  { x: 60, y: -10, r: 5 },
  { x: -60, y: 40, r: 5 },
];

// Small surface marks
const marks = [];
for (let i = 0; i < 40; i++) {
  const angle = Math.random() * Math.PI * 2;
  const dist = Math.random() * moonR * 0.9;
  marks.push({
    x: Math.cos(angle) * dist,
    y: Math.sin(angle) * dist,
    r: 1 + Math.random() * 3,
    alpha: 0.03 + Math.random() * 0.06,
  });
}

function drawHalo() {
  const pulse = 0.9 + 0.1 * Math.sin(t * 0.8);
  // Outermost glow
  for (let i = 4; i >= 0; i--) {
    const radius = moonR + 30 + i * 30;
    const alpha = (0.02 + 0.01 * Math.sin(t * 0.5 + i)) * pulse;
    const glow = ctx.createRadialGradient(cx, cy, moonR, cx, cy, radius);
    glow.addColorStop(0, `rgba(220, 210, 190, ${alpha})`);
    glow.addColorStop(0.5, `rgba(200, 190, 160, ${alpha * 0.4})`);
    glow.addColorStop(1, 'rgba(200, 190, 160, 0)');
    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(cx, cy, radius, 0, Math.PI * 2);
    ctx.fill();
  }

  // Inner bright halo
  const innerGlow = ctx.createRadialGradient(cx, cy, moonR * 0.95, cx, cy, moonR + 25);
  innerGlow.addColorStop(0, `rgba(255, 248, 230, ${0.15 * pulse})`);
  innerGlow.addColorStop(0.5, `rgba(240, 230, 200, ${0.06 * pulse})`);
  innerGlow.addColorStop(1, 'rgba(240, 230, 200, 0)');
  ctx.fillStyle = innerGlow;
  ctx.beginPath();
  ctx.arc(cx, cy, moonR + 25, 0, Math.PI * 2);
  ctx.fill();
}

function drawMoon() {
  ctx.save();
  ctx.translate(cx, cy);

  // Clip to moon circle
  ctx.beginPath();
  ctx.arc(0, 0, moonR, 0, Math.PI * 2);
  ctx.clip();

  // Base moon surface — gradient for 3D feel
  const baseGrad = ctx.createRadialGradient(-20, -20, 10, 0, 0, moonR);
  baseGrad.addColorStop(0, '#F0EDE5');
  baseGrad.addColorStop(0.5, '#DDD8CC');
  baseGrad.addColorStop(0.8, '#C8C0B0');
  baseGrad.addColorStop(1, '#A8A090');
  ctx.fillStyle = baseGrad;
  ctx.beginPath();
  ctx.arc(0, 0, moonR, 0, Math.PI * 2);
  ctx.fill();

  // Surface texture marks
  marks.forEach(m => {
    ctx.beginPath();
    ctx.arc(m.x, m.y, m.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(120, 115, 100, ${m.alpha})`;
    ctx.fill();
  });

  // Craters
  craters.forEach(c => {
    // Crater shadow (outer)
    ctx.beginPath();
    ctx.arc(c.x, c.y, c.r, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(140, 130, 115, 0.3)';
    ctx.fill();

    // Crater inner (lighter)
    ctx.beginPath();
    ctx.arc(c.x + 1, c.y + 1, c.r * 0.75, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(180, 175, 160, 0.25)';
    ctx.fill();

    // Crater rim highlight
    ctx.beginPath();
    ctx.arc(c.x - c.r * 0.15, c.y - c.r * 0.15, c.r, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(210, 205, 195, 0.15)';
    ctx.lineWidth = 1;
    ctx.stroke();
  });

  // Maria (dark patches)
  ctx.fillStyle = 'rgba(130, 125, 110, 0.12)';
  ctx.beginPath();
  ctx.ellipse(-20, 10, 40, 30, -0.3, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(20, -25, 25, 20, 0.4, 0, Math.PI * 2);
  ctx.fill();

  // Terminator (soft shadow on right side for depth)
  const termGrad = ctx.createLinearGradient(-moonR, 0, moonR, 0);
  termGrad.addColorStop(0, 'rgba(0,0,0,0)');
  termGrad.addColorStop(0.75, 'rgba(0,0,0,0)');
  termGrad.addColorStop(1, 'rgba(0,0,0,0.2)');
  ctx.fillStyle = termGrad;
  ctx.beginPath();
  ctx.arc(0, 0, moonR, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();

  // Golden edge light (right side crescent)
  ctx.save();
  ctx.translate(cx, cy);
  ctx.beginPath();
  ctx.arc(0, 0, moonR, -0.8, 0.8);
  ctx.strokeStyle = 'rgba(201, 168, 76, 0.3)';
  ctx.lineWidth = 3;
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(0, 0, moonR + 1, -0.5, 0.5);
  ctx.strokeStyle = 'rgba(201, 168, 76, 0.15)';
  ctx.lineWidth = 5;
  ctx.stroke();
  ctx.restore();
}

function drawStars() {
  // Background stars
  const starData = [
    [40, 120, 1.2], [120, 80, 0.8], [300, 150, 1.0], [60, 600, 1.5],
    [200, 700, 0.9], [330, 500, 1.1], [150, 750, 0.7], [280, 680, 1.3],
    [50, 350, 0.6], [320, 250, 0.9], [180, 200, 0.5], [250, 550, 1.0],
    [100, 450, 0.8], [340, 380, 0.7], [30, 500, 1.1], [220, 100, 0.6],
  ];
  starData.forEach(([sx, sy, ss]) => {
    const alpha = 0.2 + 0.4 * Math.abs(Math.sin(t * 0.7 + sx * 0.1));
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#d4cfc0';
    ctx.beginPath();
    ctx.arc(sx, sy, ss, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

function frame(ts) {
  t = ts / 1000;
  // Dark background
  const bg = ctx.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0, '#010e14');
  bg.addColorStop(0.3, '#01222f');
  bg.addColorStop(0.6, '#024256');
  bg.addColorStop(1, '#01222f');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  drawStars();
  drawHalo();
  drawMoon();

  requestAnimationFrame(frame);
}

requestAnimationFrame(frame);
</script>
</body>
</html>
