<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Starfield — Hartley Capital</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #024256; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="c" width="375" height="812"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 375, H = 812;

// Generate star layers
function makeStar(layer) {
  return {
    x: Math.random() * W,
    y: Math.random() * H,
    size: layer === 0 ? 0.5 + Math.random() * 1.2 :
          layer === 1 ? 1.2 + Math.random() * 1.5 :
                        2 + Math.random() * 2,
    twinkleSpeed: 0.3 + Math.random() * 2.5,
    twinkleOffset: Math.random() * Math.PI * 2,
    layer: layer,
    isGold: Math.random() < 0.12,
  };
}

const stars = [];
// Layer 0: far background (tiny, slow)
for (let i = 0; i < 50; i++) stars.push(makeStar(0));
// Layer 1: mid (medium)
for (let i = 0; i < 40; i++) stars.push(makeStar(1));
// Layer 2: near (large, fast parallax)
for (let i = 0; i < 25; i++) stars.push(makeStar(2));

// A few special bright stars with cross flare
const brightStars = [
  { x: 90, y: 180, size: 3.5, twinkleSpeed: 0.8, twinkleOffset: 0 },
  { x: 300, y: 400, size: 3, twinkleSpeed: 1.2, twinkleOffset: 1.5 },
  { x: 180, y: 650, size: 3.2, twinkleSpeed: 0.6, twinkleOffset: 3 },
  { x: 50, y: 500, size: 2.8, twinkleSpeed: 1.0, twinkleOffset: 2 },
  { x: 340, y: 100, size: 2.5, twinkleSpeed: 1.4, twinkleOffset: 0.7 },
];

let t = 0;

function drawBackground() {
  // Deep gradient — teal to near-black
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#011a24');
  grad.addColorStop(0.3, '#01222f');
  grad.addColorStop(0.5, '#024256');
  grad.addColorStop(0.7, '#01222f');
  grad.addColorStop(1, '#010e14');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Subtle nebula glow
  const neb1 = ctx.createRadialGradient(100, 300, 10, 100, 300, 180);
  neb1.addColorStop(0, 'rgba(40, 100, 140, 0.08)');
  neb1.addColorStop(1, 'rgba(40, 100, 140, 0)');
  ctx.fillStyle = neb1;
  ctx.fillRect(0, 0, W, H);

  const neb2 = ctx.createRadialGradient(280, 600, 10, 280, 600, 150);
  neb2.addColorStop(0, 'rgba(100, 60, 30, 0.06)');
  neb2.addColorStop(1, 'rgba(100, 60, 30, 0)');
  ctx.fillStyle = neb2;
  ctx.fillRect(0, 0, W, H);
}

function drawStar(s, parallaxY) {
  const alpha = 0.3 + 0.7 * (0.5 + 0.5 * Math.sin(t * s.twinkleSpeed + s.twinkleOffset));
  const y = ((s.y + parallaxY) % H + H) % H;

  ctx.globalAlpha = alpha;
  if (s.isGold) {
    ctx.fillStyle = '#c9a84c';
  } else {
    ctx.fillStyle = '#e8edf0';
  }
  ctx.beginPath();
  ctx.arc(s.x, y, s.size, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;
}

function drawBrightStar(s) {
  const alpha = 0.5 + 0.5 * Math.sin(t * s.twinkleSpeed + s.twinkleOffset);
  const flareLen = s.size * 4 * (0.6 + 0.4 * alpha);

  ctx.save();
  ctx.translate(s.x, s.y);
  ctx.globalAlpha = alpha * 0.6;

  // Cross flare
  ctx.strokeStyle = '#c9a84c';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(-flareLen, 0); ctx.lineTo(flareLen, 0);
  ctx.moveTo(0, -flareLen); ctx.lineTo(0, flareLen);
  ctx.stroke();

  // Core glow
  const glow = ctx.createRadialGradient(0, 0, 0, 0, 0, s.size * 3);
  glow.addColorStop(0, `rgba(201, 168, 76, ${alpha * 0.5})`);
  glow.addColorStop(1, 'rgba(201, 168, 76, 0)');
  ctx.fillStyle = glow;
  ctx.beginPath();
  ctx.arc(0, 0, s.size * 3, 0, Math.PI * 2);
  ctx.fill();

  // Bright center
  ctx.globalAlpha = 0.7 + 0.3 * alpha;
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(0, 0, s.size * 0.6, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

function frame(ts) {
  t = ts / 1000;
  drawBackground();

  // Parallax speeds per layer
  const speeds = [0.3, 0.8, 1.8];

  stars.forEach(s => {
    const parallaxY = t * speeds[s.layer] * 5;
    drawStar(s, parallaxY);
  });

  brightStars.forEach(drawBrightStar);

  requestAnimationFrame(frame);
}

requestAnimationFrame(frame);
</script>
</body>
</html>
